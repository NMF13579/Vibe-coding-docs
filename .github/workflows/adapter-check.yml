name: "Legacy Adapter Check (compatibility only, not canonical)"
# STATUS: legacy-compatibility
# Compatibility-only workflow; not global system health.
on:
  push:
    branches: [dev, main]
    paths:
      - 'LAYER-1/adapters/**'
      - 'LAYER-1/adapter-registry.md'
      - '.cursor/**'
      - '*.rules'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'AGENTS.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify scripts are present
        run: |
          for script in scripts/validate-adapters.sh scripts/legacy-health-check.sh; do
            if [ ! -f "$script" ]; then
              echo "❌ MISSING: $script"
              exit 1
            else
              echo "✅ Found: $script"
            fi
          done
      - name: Run compatibility checks
        run: |
          chmod +x scripts/validate-adapters.sh
          chmod +x scripts/legacy-health-check.sh
          bash scripts/validate-adapters.sh .
          bash scripts/legacy-health-check.sh || true
