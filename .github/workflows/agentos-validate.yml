name: AgentOS Validate

on:
  pull_request:
  push:
    branches:
      - dev

jobs:
  agentos-validate:
    name: agentos-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile unified validator
        id: compile
        continue-on-error: true
        run: |
          python -m py_compile scripts/agentos-validate.py

      - name: Prepare evidence directory
        run: |
          mkdir -p reports/ci

      - name: Run AgentOS validate (human-readable)
        id: validate_human
        continue-on-error: true
        run: |
          python scripts/agentos-validate.py all

      - name: Run AgentOS validate (json)
        id: validate_json
        continue-on-error: true
        run: |
          python scripts/agentos-validate.py all --json > reports/ci/agentos-validate.json

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentos-validation-evidence
          path: reports/ci/agentos-validate.json

      - name: Enforce AgentOS validation result
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path("reports/ci/agentos-validate.json")

          if not path.exists():
              print("ERROR: agentos-validation-result.json not found.")
              print("Cause: validation step did not run or infrastructure error prevented result file creation.")
              print("Blocking merge due to missing result.")
              sys.exit(1)

          try:
              data = json.loads(path.read_text(encoding="utf-8"))
          except Exception as exc:
              print(f"ERROR: agentos-validation-result.json is not valid JSON: {exc}")
              print("Blocking merge due to unparsable result.")
              sys.exit(1)

          result = str(data.get("result", "")).upper().strip()

          blocking = {"WARN", "FAIL", "ERROR", "NOT_RUN", "INCOMPLETE"}

          if result == "":
              print("ERROR: AgentOS result field is empty or missing. Blocking merge.")
              sys.exit(1)

          if result in blocking:
              print(f"AgentOS result: {result}. Merge blocked.")
              sys.exit(1)

          if result != "PASS":
              print(f"ERROR: Unknown AgentOS result '{result}'. Blocking merge.")
              sys.exit(1)

          print("AgentOS result: PASS. Merge allowed.")
          PY
