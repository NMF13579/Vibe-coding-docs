name: AgentOS Validate

on:
  pull_request:
  push:
    branches:
      - dev

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile unified validator
        id: compile
        continue-on-error: true
        run: |
          python -m py_compile scripts/agentos-validate.py

      - name: Prepare evidence directory
        run: |
          mkdir -p reports/ci

      - name: Run AgentOS validate (human-readable)
        id: validate_human
        continue-on-error: true
        run: |
          python scripts/agentos-validate.py all

      - name: Run AgentOS validate (json)
        id: validate_json
        continue-on-error: true
        run: |
          python scripts/agentos-validate.py all --json > reports/ci/agentos-validate.json

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentos-validation-evidence
          path: reports/ci/agentos-validate.json

      - name: Fail job if validation failed
        if: always()
        run: |
          if [ "${{ steps.compile.outcome }}" != "success" ] || \
             [ "${{ steps.validate_human.outcome }}" != "success" ] || \
             [ "${{ steps.validate_json.outcome }}" != "success" ]; then
            echo "Validation failed or warned; review logs and artifact."
            exit 1
          fi
