name: AgentOS Validation
on:
  pull_request:
  push:
    branches:
      - main
      - dev
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run AgentOS validation pipeline
        run: |
          python3 scripts/validate-task.py tasks/active-task.md
          python3 scripts/validate-verification.py reports/verification.md
          python3 scripts/check-pr-quality.py
          python3 scripts/check-dangerous-commands.py
          python3 scripts/check-risk.py tasks/active-task.md
          bash scripts/run-all.sh
