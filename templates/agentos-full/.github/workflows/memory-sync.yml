name: Memory Bank Sync Check

on:
  push:
    paths:
      - 'memory-bank/**'
      - 'HANDOFF.md'

jobs:
  memory-sync-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Log memory update
        run: |
          echo "💾 Memory bank updated at $(date '+%Y-%m-%d %H:%M UTC')"
          echo ""
          echo "Files changed:"
          git diff --name-only HEAD~1 HEAD -- 'memory-bank/' 'HANDOFF.md' || echo "(first commit)"

      - name: Check HANDOFF.md freshness
        run: |
          LAST_UPDATE=$(git log -1 --format="%ct" -- HANDOFF.md 2>/dev/null || echo "0")
          NOW=$(date +%s)
          DIFF=$(( (NOW - LAST_UPDATE) / 3600 ))
          echo ""
          if [ "$DIFF" -gt 24 ]; then
            echo "⚠️  HANDOFF.md not updated for ${DIFF}h. Consider saving context."
          else
            echo "✅ HANDOFF.md updated ${DIFF}h ago — looks fresh."
          fi
