name: AgentOS Validate
on:
  pull_request:
  push:
    branches: [dev]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo ${{ secrets.GITHUB_TOKEN }}
      - run: python scripts/agentos-validate.py all --json > reports/ci/agentos-validate.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentos-validation-evidence
          path: reports/ci/agentos-validate.json
