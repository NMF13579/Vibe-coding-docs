risk_policy:
  high_risk_paths:
    - ".env"
    - ".env.*"
    - "secrets/"
    - "auth/"
    - "security/"
    - "database/"
    - "migrations/"
    - "deploy/"
    - ".github/workflows/"
    - "scripts/deploy"
    - "scripts/deploy*"
  critical_command_markers:
    - "rm -rf"
    - "git reset --hard"
    - "git clean -fd"
    - "git clean -fdx"
    - "DROP TABLE"
    - "TRUNCATE TABLE"
    - "DELETE FROM"
    - "chmod 777"
    - "sudo rm"
    - "format C:"
    - "dd if="
    - "overwrite prod config"
